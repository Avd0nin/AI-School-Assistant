{% extends "base.html" %}

{% block title %}Генератор тестов и контестов{% endblock %}

{% block content %}
<section class="page-card glass-card container practice-generator-page">
    <h1 class="page-title no-copy">Тесты и контесты</h1>

    <div class="generator-mode-switch" id="generatorModeSwitch">
        <button type="button" class="generator-mode-btn is-active" data-mode="test">Тесты</button>
        <button type="button" class="generator-mode-btn" data-mode="contest">Контесты</button>
    </div>

    <div id="testPanel" class="generator-panel is-visible">
        <form id="test-form" autocomplete="off">
            <div class="form-group">
                <label for="subject">Предмет:</label>
                <input type="text" id="subject" name="subject" required placeholder="Например: Математика" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
            </div>

            <div class="form-group">
                <label for="class">Класс:</label>
                <input type="number" id="class" name="class" min="1" max="11" required placeholder="От 1 до 11">
            </div>

            <div class="form-group">
                <label for="theme">Тема:</label>
                <input type="text" id="theme" name="theme" required placeholder="Например: Дроби" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
            </div>

            <button type="submit" class="submit-btn">Сгенерировать тест</button>
        </form>

        <div id="test-loading" class="hidden test-loading-wrap">
            <div class="spinner"></div>
            <div class="loading-hint-strip">
                <div class="loading-hint no-copy" id="testLoadingHint"></div>
            </div>
        </div>

        <div id="test-result" class="hidden">
            <button type="button" id="newTestBtn" class="back-button">Создать новый тест</button>
            <p id="test-save-hint" class="test-save-hint"></p>
            <div id="test-content"></div>
            <div id="testSessionBar" class="test-session-bar hidden">
                <button type="button" class="back-button test-finish-btn" id="testFinishBtn">Завершить тест</button>
            </div>
        </div>
    </div>

    <div id="contestPanel" class="generator-panel">
        <form id="contest-form" autocomplete="off">
            <div class="form-group">
                <label for="contestDescription">Описание тем и пожеланий:</label>
                <textarea id="contestDescription" name="description" rows="4" placeholder="Например: графы + динамика, акцент на BFS/DFS и рюкзак, без слишком длинной математики" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"></textarea>
            </div>

            <div class="contest-form-grid">
                <div class="form-group">
                    <label for="contestDifficulty">Сложность (1–10):</label>
                    <div class="range-control">
                        <div class="range-head">
                            <span>Уровень</span>
                            <strong id="contestDifficultyValue">5 — средний</strong>
                        </div>
                        <input type="range" id="contestDifficulty" name="difficulty" min="1" max="10" step="1" value="5" class="custom-range">
                        <div class="range-hints">
                            <span>1 — легко</span>
                            <span>10 — олимпиадно</span>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="contestTasksCount">Количество задач (1–10):</label>
                    <div class="range-control">
                        <div class="range-head">
                            <span>Задачи</span>
                            <strong id="contestTasksCountValue">4</strong>
                        </div>
                        <input type="range" id="contestTasksCount" name="tasks_count" min="1" max="10" step="1" value="4" class="custom-range">
                        <div class="range-hints">
                            <span>Минимум: 1</span>
                            <span>Максимум: 10</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="contest-form-grid contest-form-grid-extra">
                <div class="form-group">
                    <label for="contestDuration">Длительность контеста (мин):</label>
                    <div class="range-control">
                        <div class="range-head">
                            <span>Таймер</span>
                            <strong id="contestDurationValue">60 мин</strong>
                        </div>
                        <input type="range" id="contestDuration" name="duration_minutes" min="15" max="180" step="5" value="60" class="custom-range">
                        <div class="range-hints">
                            <span>15 мин</span>
                            <span>180 мин</span>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="contest-checkbox">
                        <input type="checkbox" id="contestShowDetailedResults">
                        <span class="contest-checkbox-ui" aria-hidden="true">
                            <span class="contest-checkbox-dot"></span>
                        </span>
                        <span class="contest-checkbox-text">Показывать подробные результаты тестов</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="submit-btn">Сгенерировать контест</button>
        </form>

        <div id="contest-loading" class="hidden test-loading-wrap">
            <div class="spinner"></div>
            <div class="loading-hint-strip">
                <div class="loading-hint no-copy" id="contestLoadingHint"></div>
            </div>
        </div>

        <div id="contest-result" class="hidden contest-result-wrap">
            <div class="result-actions">
                <button type="button" class="back-button" id="newContestBtn">Создать новый контест</button>
            </div>
            <div id="contestSessionBar" class="contest-session-bar hidden"></div>
            <div id="contestFinishSummary" class="contest-finish-summary hidden"></div>
            <div class="contest-tasks" id="contestTasks"></div>
        </div>
    </div>
</section>

<div id="testFinishModal" class="profile-modal hidden" aria-hidden="true">
    <div class="profile-modal-card glass-card test-finish-modal-card" role="dialog" aria-modal="true" aria-labelledby="testFinishModalTitle">
        <h3 id="testFinishModalTitle" class="page-title-sm">Тест завершён</h3>
        <div id="testFinishModalBody"></div>
        <div class="profile-modal-actions">
            <button type="button" id="closeTestFinishModalBtn" class="secondary-btn">Закрыть</button>
            <button type="button" id="newTestFromModalBtn" class="back-button">В меню</button>
        </div>
    </div>
</div>

<script>
const initialGeneratorMode = '{{ initial_mode or "test" }}' === 'contest' ? 'contest' : 'test';
const initialSavedTestId = Number('{{ initial_test_id or 0 }}') || null;
const initialSavedContestId = Number('{{ initial_contest_id or 0 }}') || null;

const generatorModeButtons = [...document.querySelectorAll('.generator-mode-btn')];
const generatorModeSwitch = document.getElementById('generatorModeSwitch');
const testPanel = document.getElementById('testPanel');
const contestPanel = document.getElementById('contestPanel');
let generatorModeSwitchTimer = null;

function setGeneratorMode(mode, pushState = true) {
    const nextMode = mode === 'contest' ? 'contest' : 'test';
    const currentMode = generatorModeSwitch.dataset.mode || '';
    if (currentMode === nextMode) {
        if (pushState) {
            const nextUrl = new URL(window.location.href);
            if (nextMode === 'contest') {
                nextUrl.searchParams.set('mode', 'contest');
            } else {
                nextUrl.searchParams.delete('mode');
            }
            window.history.replaceState({}, '', nextUrl);
        }
        return;
    }

    generatorModeSwitch.classList.add('is-switching');
    if (generatorModeSwitchTimer) {
        clearTimeout(generatorModeSwitchTimer);
    }
    generatorModeSwitchTimer = setTimeout(() => {
        generatorModeSwitch.classList.remove('is-switching');
    }, 260);

    generatorModeSwitch.dataset.mode = nextMode;
    generatorModeButtons.forEach(button => {
        button.classList.toggle('is-active', button.dataset.mode === nextMode);
    });
    testPanel.classList.toggle('is-visible', nextMode === 'test');
    contestPanel.classList.toggle('is-visible', nextMode === 'contest');
    testPanel.setAttribute('aria-hidden', String(nextMode !== 'test'));
    contestPanel.setAttribute('aria-hidden', String(nextMode !== 'contest'));
    const testSessionBar = document.getElementById('testSessionBar');
    if (testSessionBar) {
        if (nextMode === 'test' && hasActiveTestSession()) {
            testSessionBar.classList.remove('hidden');
        } else {
            testSessionBar.classList.add('hidden');
        }
    }

    if (pushState) {
        const nextUrl = new URL(window.location.href);
        if (nextMode === 'contest') {
            nextUrl.searchParams.set('mode', 'contest');
        } else {
            nextUrl.searchParams.delete('mode');
        }
        window.history.replaceState({}, '', nextUrl);
    }
}

generatorModeButtons.forEach(button => {
    button.addEventListener('click', () => setGeneratorMode(button.dataset.mode));
});

const difficultyRange = document.getElementById('contestDifficulty');
const difficultyValueLabel = document.getElementById('contestDifficultyValue');
const tasksCountRange = document.getElementById('contestTasksCount');
const tasksCountValueLabel = document.getElementById('contestTasksCountValue');
const contestDurationRange = document.getElementById('contestDuration');
const contestDurationValueLabel = document.getElementById('contestDurationValue');

function safeBind(node, eventName, handler, options) {
    if (!node || typeof node.addEventListener !== 'function') return;
    node.addEventListener(eventName, handler, options);
}

const MODAL_ANIMATION_MS = 240;

function clearModalHideTimer(modal) {
    if (!modal || !modal.dataset) return;
    const timerRaw = modal.dataset.hideTimerId;
    if (!timerRaw) return;
    const timerId = Number(timerRaw);
    if (!Number.isNaN(timerId)) {
        window.clearTimeout(timerId);
    }
    delete modal.dataset.hideTimerId;
}

function openAnimatedModal(modal) {
    if (!modal) return;
    clearModalHideTimer(modal);
    modal.classList.remove('hidden', 'is-closing');
    modal.setAttribute('aria-hidden', 'false');
    requestAnimationFrame(() => {
        modal.classList.add('is-open');
    });
}

function closeAnimatedModal(modal, immediate = false) {
    if (!modal) return;
    clearModalHideTimer(modal);
    modal.classList.remove('is-open');
    modal.setAttribute('aria-hidden', 'true');
    if (immediate) {
        modal.classList.remove('is-closing');
        modal.classList.add('hidden');
        return;
    }
    modal.classList.add('is-closing');
    const timerId = window.setTimeout(() => {
        modal.classList.remove('is-closing');
        modal.classList.add('hidden');
        clearModalHideTimer(modal);
    }, MODAL_ANIMATION_MS);
    modal.dataset.hideTimerId = String(timerId);
}

const difficultyLabelMap = {
    1: 'очень легкий',
    2: 'легкий',
    3: 'ниже среднего',
    4: 'средний',
    5: 'средний+',
    6: 'выше среднего',
    7: 'сложный',
    8: 'очень сложный',
    9: 'предолимпиадный',
    10: 'олимпиадный'
};

function paintRangeFill(rangeElement) {
    if (!rangeElement) return;
    const min = Number(rangeElement.min || 0);
    const max = Number(rangeElement.max || 100);
    const value = Number(rangeElement.value || min);
    const percent = ((value - min) / (max - min)) * 100;
    rangeElement.style.setProperty('--range-fill', `${Math.max(0, Math.min(100, percent))}%`);
}

function updateContestRangeLabels() {
    if (!difficultyRange || !difficultyValueLabel || !tasksCountRange || !tasksCountValueLabel || !contestDurationRange || !contestDurationValueLabel) {
        return;
    }
    const difficulty = Number(difficultyRange.value || 5);
    difficultyValueLabel.textContent = `${difficulty} — ${difficultyLabelMap[difficulty] || 'средний'}`;
    tasksCountValueLabel.textContent = String(Number(tasksCountRange.value || 4));
    contestDurationValueLabel.textContent = `${Number(contestDurationRange.value || 60)} мин`;
    paintRangeFill(difficultyRange);
    paintRangeFill(tasksCountRange);
    paintRangeFill(contestDurationRange);
}

safeBind(difficultyRange, 'input', updateContestRangeLabels);
safeBind(tasksCountRange, 'input', updateContestRangeLabels);
safeBind(contestDurationRange, 'input', updateContestRangeLabels);
updateContestRangeLabels();

let currentTestId = null;
let testStartedAt = null;
let testFinished = false;
const questionResults = new Map();
let testSaveInFlight = false;
let lastSavedFingerprint = '';

setGeneratorMode(initialGeneratorMode, false);

async function checkOpenAnswer(questionText, userAnswer, subject, theme = '', klass = null) {
    try {
        const response = await fetch('/api/check_answer', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                question: questionText,
                answer: userAnswer,
                subject: subject,
                theme: theme,
                klass: klass
            })
        });

        if (response.status === 401) {
            window.location.href = '/login?next=/make_test';
            throw new Error('Требуется вход');
        }

        if (!response.ok) throw new Error(`Ошибка сервера: ${response.status}`);
        return await response.json();
    } catch (error) {
        if (error.message === 'Требуется вход') {
            throw error;
        }
        console.error('Ошибка проверки:', error);
        return {
            is_correct: false,
            feedback: 'Ошибка проверки. Пожалуйста, сверьтесь с учебником.',
            correct_answer: 'Информация недоступна'
        };
    }
}

let testHandlersInitialized = false;

function initTestHandlers() {
    if (testHandlersInitialized) return;
    testHandlersInitialized = true;

    document.addEventListener('click', async function(e) {
        const optionItem = e.target.closest('.option-item');
        if (optionItem && optionItem.closest('#test-content')) {
            const questionBlock = optionItem.closest('.question-block');
            const checkButton = questionBlock ? questionBlock.querySelector('.check-btn') : null;
            if (checkButton && !checkButton.disabled) {
                const radio = optionItem.querySelector('input[type="radio"]');
                if (radio) {
                    radio.checked = true;
                }
                optionItem.closest('.options-list').querySelectorAll('.option-item').forEach(opt => {
                    opt.classList.remove('option-selected');
                });
                optionItem.classList.add('option-selected');
            }
            return;
        }

        if (!e.target.classList.contains('check-btn')) return;

        const btn = e.target;
        const questionBlock = btn.closest('.question-block');
        if (!questionBlock) return;

        const feedback = questionBlock.querySelector('.feedback');
        const correctAnswerDiv = questionBlock.querySelector('.correct-answer');

        if (questionBlock.querySelector('.options-list')) {
            if (btn.disabled) return;

            btn.disabled = true;
            btn.classList.add('disabled-btn');

            const selected = questionBlock.querySelector('input[type="radio"]:checked');

            if (!selected) {
                showFeedback(feedback, 'Пожалуйста, выберите ответ', false);
                btn.disabled = false;
                btn.classList.remove('disabled-btn');
                return;
            }

            const isCorrect = selected.value === 'correct';
            showFeedback(
                feedback,
                isCorrect
                    ? '✅ Верно! Этот вариант соответствует условию задания.'
                    : '❌ Неверно. Правильный ответ выделен зеленым.',
                isCorrect
            );

            const optionsList = questionBlock.querySelector('.options-list');
            optionsList.querySelectorAll('.option-item').forEach(item => {
                item.classList.remove('correct-answer', 'incorrect-answer');
                const radio = item.querySelector('input[type="radio"]');
                if (radio) radio.disabled = true;
                item.style.cursor = 'default';
                item.style.pointerEvents = 'none';
                item.onmouseover = null;
                item.onmouseout = null;
            });

            if (!isCorrect) {
                selected.closest('.option-item').classList.add('incorrect-answer');
            }

            const correct = questionBlock.querySelector('input[value="correct"]');
            if (correct) {
                correct.closest('.option-item').classList.add('correct-answer');

                if (correctAnswerDiv) {
                    correctAnswerDiv.style.display = 'block';
                    correctAnswerDiv.querySelector('.correct-answer-text').textContent = correct.nextElementSibling.textContent.trim();
                    if (window.renderMathInContainer) {
                        window.renderMathInContainer(correctAnswerDiv);
                    }
                }
            }
            markQuestionResult(questionBlock, isCorrect);
        } else if (questionBlock.querySelector('.answer-input')) {
            const answerInput = questionBlock.querySelector('.answer-input');
            const questionText = questionBlock.querySelector('.question-text').textContent;
            const userAnswer = answerInput.value.trim();

            if (!userAnswer) {
                showFeedback(feedback, 'Пожалуйста, введите ваш ответ', false);
                return;
            }

            answerInput.classList.remove('correct-answer-input', 'incorrect-answer-input');
            feedback.textContent = '⌛ Проверяем ответ...';
            feedback.className = 'feedback neutral-feedback';
            feedback.style.display = 'block';

            btn.disabled = true;
            btn.classList.add('disabled-btn');

            try {
                const result = await checkOpenAnswer(
                    questionText,
                    userAnswer,
                    document.getElementById('subject').value
                );

                if (result.is_correct) {
                    showFeedback(feedback, `✅ Верно! ${result.feedback}`, true);
                    answerInput.classList.add('correct-answer-input');
                } else {
                    showFeedback(feedback, `❌ Требуются исправления: ${result.feedback}`, false);
                    answerInput.classList.add('incorrect-answer-input');
                }

                if (correctAnswerDiv) {
                    correctAnswerDiv.style.display = 'block';
                    correctAnswerDiv.querySelector('.correct-answer-text').textContent = result.correct_answer;
                    if (window.renderMathInContainer) {
                        window.renderMathInContainer(correctAnswerDiv);
                    }
                }
                markQuestionResult(questionBlock, Boolean(result.is_correct));
            } catch (error) {
                if (error.message === 'Требуется вход') {
                    return;
                }
                console.error('Ошибка:', error);
                showFeedback(feedback, '⚠️ Ошибка проверки. Попробуйте еще раз.', false);
            } finally {
                btn.disabled = false;
                btn.classList.remove('disabled-btn');
            }
        }
    });
}

function bindOptionSelectionHandlers(scope) {
    scope.querySelectorAll('.option-item').forEach(item => {
        item.addEventListener('click', function() {
            const btn = this.closest('.question-block').querySelector('.check-btn');
            if (btn && !btn.disabled) {
                const radio = this.querySelector('input[type="radio"]');
                if (radio) {
                    radio.checked = true;
                }

                this.closest('.options-list').querySelectorAll('.option-item').forEach(opt => {
                    opt.classList.remove('option-selected');
                });
                this.classList.add('option-selected');
            }
        });
    });
}

function showFeedback(element, message, isSuccess) {
    element.innerHTML = message;
    element.className = isSuccess ? 'feedback correct-feedback' : 'feedback incorrect-feedback';
    element.style.display = 'block';
}

function initQuestionIndexes() {
    document.querySelectorAll('#test-content .question-block').forEach((questionBlock, index) => {
        questionBlock.dataset.questionIndex = String(index);
    });
}

function updateSaveHint(customMessage = null) {
    const hintEl = document.getElementById('test-save-hint');
    if (!hintEl) return;
    if (customMessage !== null) {
        hintEl.textContent = customMessage;
        return;
    }
    const total = document.querySelectorAll('#test-content .question-block').length;
    const answered = questionResults.size;
    const correct = [...questionResults.values()].filter(Boolean).length;
    const score = total > 0 ? Math.round((correct / total) * 100) : 0;
    hintEl.textContent = `Проверено: ${answered}/${total}. Правильных: ${correct}. Текущий результат: ${score}%.`;
}

function resetTestState(testId) {
    currentTestId = testId ? Number(testId) : null;
    testStartedAt = Date.now();
    testFinished = false;
    questionResults.clear();
    testSaveInFlight = false;
    lastSavedFingerprint = '';
    if (currentTestId) {
        updateSaveHint('Проверьте ответы и нажмите «Завершить тест», чтобы сохранить попытку.');
    } else {
        updateSaveHint('');
    }
    const finishBtn = document.getElementById('testFinishBtn');
    if (finishBtn) finishBtn.disabled = false;
    const sessionBar = document.getElementById('testSessionBar');
    if (sessionBar) sessionBar.classList.remove('hidden');
    const modal = document.getElementById('testFinishModal');
    if (modal) {
        closeAnimatedModal(modal, true);
    }
}

function hasActiveTestSession() {
    const resultWrap = document.getElementById('test-result');
    const totalQuestions = document.querySelectorAll('#test-content .question-block').length;
    return Boolean(
        currentTestId &&
        !testFinished &&
        totalQuestions > 0 &&
        resultWrap &&
        !resultWrap.classList.contains('hidden')
    );
}

function finishTest() {
    if (testFinished) return;
    const totalQuestions = document.querySelectorAll('#test-content .question-block').length;
    if (totalQuestions <= 0) return;

    testFinished = true;
    const answered = questionResults.size;
    const correctCount = [...questionResults.values()].filter(Boolean).length;
    const unanswered = Math.max(0, totalQuestions - answered);
    const wrongChecked = Math.max(0, answered - correctCount);
    const failedCount = wrongChecked + unanswered;
    const score = Math.round((correctCount / totalQuestions) * 100);
    const progressPct = Math.max(0, Math.min(100, score));

    document.querySelectorAll('#test-content .check-btn').forEach(btn => {
        btn.disabled = true;
        btn.classList.add('disabled-btn');
    });
    document.querySelectorAll('#test-content .answer-input').forEach(input => {
        input.disabled = true;
        input.setAttribute('readonly', 'readonly');
    });
    document.querySelectorAll('#test-content .option-item').forEach(item => {
        item.style.pointerEvents = 'none';
        item.style.cursor = 'default';
    });
    document.querySelectorAll('#test-content input[type="radio"]').forEach(input => {
        input.disabled = true;
    });

    let verdictTitle = 'Хороший результат';
    let verdictText = 'Разберите ошибки и попробуйте улучшить итог.';
    if (score === 100) {
        verdictTitle = 'Отлично';
        verdictText = 'Все вопросы решены правильно.';
    } else if (score >= 75) {
        verdictTitle = 'Очень хорошо';
        verdictText = 'Почти всё решено, осталось немного подтянуть.';
    } else if (score >= 50) {
        verdictTitle = 'Неплохо';
        verdictText = 'База есть, но часть тем стоит повторить.';
    } else if (score > 0) {
        verdictTitle = 'Есть прогресс';
        verdictText = 'Сфокусируйтесь на ошибках и ключевых правилах темы.';
    } else {
        verdictTitle = 'Нужна доработка';
        verdictText = 'Пока верных ответов нет, но это можно быстро исправить тренировкой.';
    }

    const modalBody = document.getElementById('testFinishModalBody');
    if (modalBody) {
        modalBody.innerHTML = `
            <div class="contest-finish-header">
                <span class="contest-finish-score">${score}%</span>
            </div>
            <p class="contest-finish-lead">${verdictTitle}. ${verdictText}</p>
            <div class="contest-finish-progress">
                <div class="contest-finish-progress-bar" style="width: ${progressPct}%;"></div>
            </div>
            <p class="contest-finish-progress-label">Правильных ${correctCount} из ${totalQuestions} (${progressPct}%)</p>
            <div class="contest-finish-grid">
                <div><strong>Проверено:</strong> ${answered}/${totalQuestions}</div>
                <div><strong>Верно:</strong> ${correctCount}</div>
                <div><strong>Ошибок:</strong> ${failedCount}</div>
                <div><strong>Непроверено:</strong> ${unanswered}</div>
                <div><strong>Результат:</strong> ${score}%</div>
            </div>
        `;
    }
    const finishModal = document.getElementById('testFinishModal');
    if (finishModal) {
        openAnimatedModal(finishModal);
    }

    const finishBtn = document.getElementById('testFinishBtn');
    if (finishBtn) finishBtn.disabled = true;

    saveTestResult({ force: true, silent: true, keepalive: true });
    updateSaveHint(`Тест завершён: ${correctCount}/${totalQuestions} (${score}%).`);
}

function getCurrentTestContext() {
    const subjectEl = document.getElementById('subject');
    const themeEl = document.getElementById('theme');
    const classEl = document.getElementById('class');
    return {
        subject: subjectEl ? String(subjectEl.value || '').trim() : '',
        theme: themeEl ? String(themeEl.value || '').trim() : '',
        klass: classEl ? Number(classEl.value || 0) || null : null
    };
}

async function getChoiceExplanation(questionBlock, selectedText, isCorrect) {
    const questionText = (questionBlock.querySelector('.question-text')?.textContent || '').trim();
    const optionTexts = [...questionBlock.querySelectorAll('.option-item .option-text')]
        .map((node, idx) => `${idx + 1}) ${(node.textContent || '').trim()}`)
        .filter(Boolean);
    const correctText = (questionBlock.querySelector('input[value="correct"]')?.nextElementSibling?.textContent || '').trim();
    const contextQuestion = [
        questionText,
        optionTexts.length ? `Варианты:\n${optionTexts.join('\n')}` : '',
        correctText ? `Эталонный правильный вариант: ${correctText}` : '',
        isCorrect
            ? 'Поясни в 1-2 предложениях, почему выбранный ответ верный.'
            : 'Поясни в 1-2 предложениях, почему выбранный ответ неверный и на что смотреть в условии.'
    ].filter(Boolean).join('\n\n');

    const testContext = getCurrentTestContext();
    const result = await checkOpenAnswer(
        contextQuestion,
        selectedText,
        testContext.subject,
        testContext.theme,
        testContext.klass
    );
    return String(result && result.feedback ? result.feedback : '').trim();
}

function markQuestionResult(questionBlock, isCorrect) {

function buildTestResultFingerprint() {
    return [...questionResults.entries()]
        .sort((a, b) => a[0] - b[0])
        .map(([idx, ok]) => `${idx}:${ok ? 1 : 0}`)
        .join('|');
}

function buildTestAttemptPayload() {
    if (!currentTestId) return null;
    const totalQuestions = document.querySelectorAll('#test-content .question-block').length;
    if (totalQuestions <= 0) return null;
    const answered = questionResults.size;
    const correctCount = [...questionResults.values()].filter(Boolean).length;
    const score = Math.round((correctCount / totalQuestions) * 100);
    const durationSec = testStartedAt ? Math.max(0, Math.round((Date.now() - testStartedAt) / 1000)) : null;
    return {
        payload: {
            test_id: currentTestId,
            score,
            total_questions: totalQuestions,
            correct_count: correctCount,
            duration_sec: durationSec,
            is_final: testFinished ? 1 : 0
        },
        totalQuestions,
        answered,
        correctCount,
        score
    };
}

async function saveTestResult(options = {}) {
    const {
        force = false,
        silent = false,
        keepalive = false,
        useBeacon = false,
        isFinal = testFinished
    } = options;
    const hintEl = document.getElementById('test-save-hint');

    if (!currentTestId) {
        if (!silent) updateSaveHint('Не удалось определить id теста, сохранение недоступно.');
        return;
    }

    if (testSaveInFlight) return;

    const attempt = buildTestAttemptPayload();
    if (!attempt) return;
    const { payload: attemptPayload, totalQuestions, answered, correctCount, score } = attempt;
    attemptPayload.is_final = isFinal ? 1 : 0;

    // Попытка в таблицу должна попадать только после завершения теста.
    if (attemptPayload.is_final !== 1) return;

    const fingerprint = buildTestResultFingerprint();
    if (!force && (!fingerprint || fingerprint === lastSavedFingerprint)) return;

    testSaveInFlight = true;

    try {
        if (useBeacon && navigator.sendBeacon) {
            const blob = new Blob([JSON.stringify(attemptPayload)], { type: 'application/json' });
            const sent = navigator.sendBeacon('/api/test_attempt', blob);
            if (sent) {
                lastSavedFingerprint = fingerprint || `force:${Date.now()}`;
                return;
            }
        }

        const response = await fetch('/api/test_attempt', {
            method: 'POST',
            keepalive: Boolean(keepalive),
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(attemptPayload)
        });

        if (response.status === 401) {
            window.location.href = '/login?next=/make_test';
            throw new Error('Требуется вход');
        }

        if (!response.ok) {
            let details = 'Не удалось сохранить результат.';
            try {
                const payload = await response.json();
                if (payload && payload.error) details = payload.error;
            } catch (e) {
            }
            throw new Error(details);
        }

        const responsePayload = await response.json();
        if (responsePayload && responsePayload.ok) {
            lastSavedFingerprint = fingerprint || `force:${Date.now()}`;
            if (!silent && (isFinal || attemptPayload.is_final === 1)) {
                updateSaveHint(`Сохранено автоматически: ${correctCount}/${totalQuestions} (${score}%).`);
            }
        } else {
            throw new Error('Не удалось сохранить результат.');
        }
    } catch (error) {
        if (error.message === 'Требуется вход') return;
        if (!silent && hintEl) hintEl.textContent = `Ошибка сохранения: ${error.message}`;
    } finally {
        testSaveInFlight = false;
    }
}

function sanitizeHtml(rawHtml) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(rawHtml || '', 'text/html');
    const blockedTags = ['script', 'style', 'iframe', 'object', 'embed', 'link', 'meta'];
    blockedTags.forEach(tag => doc.querySelectorAll(tag).forEach(el => el.remove()));

    doc.querySelectorAll('*').forEach(el => {
        [...el.attributes].forEach(attr => {
            const name = attr.name.toLowerCase();
            const value = (attr.value || '').toLowerCase();
            if (name.startsWith('on') || name === 'style' || value.includes('javascript:')) {
                el.removeAttribute(attr.name);
            }
        });
    });
    return doc.body.innerHTML;
}

function convertCodeFencesToHtml(rawText) {
    if (!rawText) return '';
    return rawText.replace(/```([a-zA-Z0-9_+#.-]+)?\n([\s\S]*?)```/g, (_, lang, code) => {
        const safeLang = window.normalizeCodeLanguage
            ? window.normalizeCodeLanguage(lang)
            : (lang || '').toLowerCase().trim();
        const langClass = safeLang ? `language-${safeLang}` : '';
        const langData = safeLang ? ` data-lang="${safeLang}"` : '';
        const escapedCode = String(code)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
        return `<pre><code class="${langClass}"${langData}>${escapedCode}</code></pre>`;
    });
}

function enhanceCodeBlocks(container) {
    if (!container) return;
    container.querySelectorAll('pre').forEach(pre => {
        if (pre.dataset.enhanced === '1') return;

        const codeEl = pre.querySelector('code') || pre;
        const declaredLanguage = window.extractCodeLanguage
            ? window.extractCodeLanguage(codeEl, pre)
            : '';
        let languageLabel = window.getCodeLanguageLabel
            ? window.getCodeLanguageLabel(declaredLanguage)
            : (declaredLanguage ? declaredLanguage.toUpperCase() : 'Код');

        const wrap = document.createElement('div');
        wrap.className = 'summary-code-wrap';

        const head = document.createElement('div');
        head.className = 'summary-code-head';

        const langTag = document.createElement('span');
        langTag.className = 'summary-code-lang no-copy';
        langTag.textContent = languageLabel;

        const copyBtn = document.createElement('button');
        copyBtn.type = 'button';
        copyBtn.className = 'summary-copy-btn';
        copyBtn.textContent = 'Скопировать';
        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(codeEl.textContent || '');
                copyBtn.textContent = 'Скопировано';
            } catch (e) {
                copyBtn.textContent = 'Ошибка';
            }
            setTimeout(() => {
                copyBtn.textContent = 'Скопировать';
            }, 1200);
        });

        head.appendChild(langTag);
        head.appendChild(copyBtn);
        pre.parentNode.insertBefore(wrap, pre);
        wrap.appendChild(head);
        wrap.appendChild(pre);

        if (window.highlightCodeElement) {
            const result = window.highlightCodeElement(codeEl, pre, declaredLanguage);
            languageLabel = result && result.label ? result.label : languageLabel;
            langTag.textContent = languageLabel;
        } else if (window.hljs && codeEl) {
            window.hljs.highlightElement(codeEl);
        }

        pre.dataset.enhanced = '1';
    });
}

function getRussianWord(value, one, few, many) {
    const n = Math.abs(Number(value || 0));
    const mod10 = n % 10;
    const mod100 = n % 100;
    if (mod10 === 1 && mod100 !== 11) return one;
    if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) return few;
    return many;
}

function initContestEditor(runner, taskIndex) {
    const codeInput = runner.querySelector('.contest-code-input');
    const languageSelect = runner.querySelector('.contest-language-select');
    const outputWrap = runner.querySelector('.contest-run-output');
    const languageDropdown = runner.querySelector('[data-language-dropdown]');
    const languageTrigger = runner.querySelector('[data-language-trigger]');
    const languageCurrent = runner.querySelector('[data-language-current]');
    const languageMenu = runner.querySelector('[data-language-menu]');
    const languageItems = [...runner.querySelectorAll('[data-language-value]')];
    if (!codeInput || !languageSelect) return;

    if (!window.CodeMirror || typeof window.CodeMirror.fromTextArea !== 'function') {
        return;
    }

    ensureContestThemeObserver();

    const editor = window.CodeMirror.fromTextArea(codeInput, {
        mode: getContestEditorMode(languageSelect.value || 'python'),
        theme: getContestEditorTheme(),
        lineNumbers: true,
        lineWrapping: false,
        indentUnit: 4,
        tabSize: 4,
        indentWithTabs: false,
        autoCloseBrackets: true,
        matchBrackets: true,
        electricChars: false,
        viewportMargin: Infinity,
        extraKeys: {
            Tab: (cm) => {
                if (cm.somethingSelected()) {
                    cm.indentSelection('add');
                } else {
                    cm.replaceSelection('    ', 'end', '+input');
                }
            },
            'Shift-Tab': (cm) => cm.indentSelection('subtract')
        }
    });

    const wrapper = editor.getWrapperElement();
    if (wrapper) {
        wrapper.classList.add('contest-cm-editor');
    }

    contestEditors.set(taskIndex, {
        editor,
        select: languageSelect,
        onLanguageChange: null,
        currentLanguage: languageSelect.value === 'cpp' ? 'cpp' : 'python',
        drafts: { python: '', cpp: '' },
        cleanup: []
    });

    const entry = contestEditors.get(taskIndex);
    entry.drafts.python = editor.getValue();

    const addCleanupListener = (target, eventName, listener, options) => {
        if (!target || typeof target.addEventListener !== 'function') return;
        target.addEventListener(eventName, listener, options);
        entry.cleanup.push(() => target.removeEventListener(eventName, listener, options));
    };

    const closeLanguageDropdown = () => {
        if (languageDropdown) languageDropdown.classList.remove('is-open');
        if (languageTrigger) languageTrigger.setAttribute('aria-expanded', 'false');
    };

    const updateLanguageUi = (language) => {
        const safeLanguage = language === 'cpp' ? 'cpp' : 'python';
        if (languageCurrent) {
            languageCurrent.textContent = safeLanguage === 'cpp' ? 'C++' : 'Python';
        }
        languageItems.forEach((item) => {
            const isSelected = item.dataset.languageValue === safeLanguage;
            item.classList.toggle('is-selected', isSelected);
            item.setAttribute('aria-selected', String(isSelected));
        });
        closeLanguageDropdown();
    };

    const setEditorLanguage = (nextLanguage) => {
        const safeLanguage = nextLanguage === 'cpp' ? 'cpp' : 'python';
        const previousLanguage = entry.currentLanguage;

        entry.drafts[previousLanguage] = editor.getValue();

        let nextCode = '';
        if (safeLanguage === 'cpp') {
            const hasCppDraft = (entry.drafts.cpp || '').trim().length > 0;
            if (!hasCppDraft) {
                nextCode = contestCodeTemplates.cpp;
            } else {
                nextCode = entry.drafts.cpp;
            }
        } else {
            nextCode = entry.drafts.python || '';
        }

        editor.setValue(nextCode);
        editor.clearHistory();
        setContestEditorMode(taskIndex, safeLanguage);
        languageSelect.value = safeLanguage;
        entry.currentLanguage = safeLanguage;
        entry.drafts[safeLanguage] = nextCode;
        updateLanguageUi(safeLanguage);

        if (outputWrap) {
            outputWrap.innerHTML = '';
        }
        editor.focus();
        refreshContestEditor(taskIndex);
    };

    const onLanguageChange = () => {
        setEditorLanguage(languageSelect.value === 'cpp' ? 'cpp' : 'python');
    };
    languageSelect.addEventListener('change', onLanguageChange);
    entry.onLanguageChange = onLanguageChange;

    if (languageDropdown && languageTrigger && languageMenu && languageItems.length) {
        addCleanupListener(languageTrigger, 'click', (event) => {
            event.preventDefault();
            if (languageTrigger.disabled) return;
            const willOpen = !languageDropdown.classList.contains('is-open');
            languageDropdown.classList.toggle('is-open', willOpen);
            languageTrigger.setAttribute('aria-expanded', String(willOpen));
        });

        languageItems.forEach((item) => {
            addCleanupListener(item, 'click', (event) => {
                event.preventDefault();
                if (languageTrigger.disabled) return;
                const nextLanguage = item.dataset.languageValue === 'cpp' ? 'cpp' : 'python';
                if (languageSelect.value === nextLanguage) {
                    closeLanguageDropdown();
                    return;
                }
                languageSelect.value = nextLanguage;
                onLanguageChange();
            });
        });

        addCleanupListener(document, 'click', (event) => {
            if (!languageDropdown.contains(event.target)) {
                closeLanguageDropdown();
            }
        });

        addCleanupListener(document, 'keydown', (event) => {
            if (event.key === 'Escape') {
                closeLanguageDropdown();
            }
        });
    }

    if (contestFinished) {
        editor.setOption('readOnly', 'nocursor');
        if (languageTrigger) languageTrigger.disabled = true;
        languageItems.forEach((item) => {
            item.disabled = true;
        });
    }

    updateLanguageUi(entry.currentLanguage);
    refreshContestEditor(taskIndex);
}

function formatDuration(seconds) {
    const safe = Math.max(0, Number(seconds || 0));
    const hours = Math.floor(safe / 3600);
    const minutes = Math.floor((safe % 3600) / 60);
    const secs = safe % 60;
    if (hours > 0) {
        return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }
    return `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
}

                <strong id="contestTimerValue">${formatDuration(contestDurationSeconds)}</strong>
            </div>
            <button type="button" class="back-button contest-finish-btn" id="contestFinishBtn">Завершить контест</button>
        </div>
    `;

function setActiveContestTask(index) {
    const tasks = [...document.querySelectorAll('#contestTasks .contest-task-card')];
    const navButtons = [...document.querySelectorAll('.contest-task-nav-btn')];
    if (!tasks.length) return;

    const safeIndex = Math.max(0, Math.min(tasks.length - 1, Number(index || 0)));
    activeContestTaskIndex = safeIndex;

    tasks.forEach((card, cardIndex) => {
        card.classList.toggle('is-active', cardIndex === safeIndex);
    });
    navButtons.forEach((button, buttonIndex) => {
        button.classList.toggle('is-current', buttonIndex === safeIndex);
    });

    refreshContestEditor(safeIndex);
}

function refreshContestTaskNavStyles() {
    const navButtons = [...document.querySelectorAll('.contest-task-nav-btn')];
    navButtons.forEach((button, index) => {
        button.classList.remove('idle', 'solved', 'failed');
        button.classList.add(getTaskStateClass(contestTaskStates[index]));
        button.classList.toggle('is-current', index === activeContestTaskIndex);
    });
}

function updateContestTimer() {
    const timerEl = document.getElementById('contestTimerValue');
    if (!timerEl || contestFinished) return;

    const elapsed = Math.floor((Date.now() - contestStartedAt) / 1000);
    const remaining = contestDurationSeconds - elapsed;
    timerEl.textContent = formatDuration(remaining);

    if (remaining <= 0) {
        finishContest(true);
    }
}

function startContestSession(durationMinutes) {
    contestFinished = false;
    contestStartedAt = Date.now();
    contestDurationSeconds = Math.max(15, Number(durationMinutes || 60)) * 60;
    clearContestTimer();
    updateContestTimer();
    contestTimerInterval = setInterval(updateContestTimer, 1000);
}

function finishContest(autoFinished = false) {
    if (contestFinished) return;
    contestFinished = true;
    clearContestTimer();

    const elapsedSec = Math.floor((Date.now() - contestStartedAt) / 1000);
    const timeUsed = Math.min(contestDurationSeconds, elapsedSec);
    const total = contestTaskStates.length;
    const solved = contestTaskStates.filter(item => item.status === 'solved').length;
    const failed = Math.max(0, total - solved);
    const attempts = contestTaskStates.reduce((acc, item) => acc + Number(item.attempts || 0), 0);
    const score = total > 0 ? Math.round((solved / total) * 100) : 0;
    const progressPct = total > 0 ? Math.max(0, Math.min(100, Math.round((solved / total) * 100))) : 0;
    const solvedWord = getRussianWord(solved, 'задача', 'задачи', 'задач');
    const totalWord = getRussianWord(total, 'задача', 'задачи', 'задач');
    const attemptsWord = getRussianWord(attempts, 'запуск', 'запуска', 'запусков');

    let verdictTitle = 'Хороший результат';
    let verdictText = 'Есть база, можно добить оставшиеся задачи.';
    if (score === 100) {
        verdictTitle = 'Отлично, контест решён полностью';
        verdictText = 'Все задачи приняты. Сильное прохождение.';
    } else if (score >= 75) {
        verdictTitle = 'Очень достойно';
        verdictText = 'Большая часть контеста закрыта, осталось немного.';
    } else if (score >= 50) {
        verdictTitle = 'Неплохой прогресс';
        verdictText = 'Половина задач взята, есть над чем доработать.';
    } else if (score > 0) {
        verdictTitle = 'Старт есть';
        verdictText = 'Разберите нерешённые задачи и попробуйте ещё раз.';
    } else {
        verdictTitle = 'Нужно ещё попробовать';
        verdictText = 'Пока задачи не решены, но после разбора будет лучше.';
    }

    document.querySelectorAll('.contest-run-btn').forEach(button => {
        button.disabled = true;
    });
    document.querySelectorAll('.contest-language-select').forEach(control => {
        control.disabled = true;
    });
    document.querySelectorAll('[data-language-trigger]').forEach(control => {
        control.disabled = true;
    });
    document.querySelectorAll('[data-language-value]').forEach(control => {
        control.disabled = true;
    });
    document.querySelectorAll('.contest-code-input').forEach(control => {
        control.disabled = true;
    });
    setContestEditorsReadOnly(true);

    const finishBtn = document.getElementById('contestFinishBtn');
    if (finishBtn) finishBtn.disabled = true;

    const summaryWrap = document.getElementById('contestFinishSummary');
    if (summaryWrap) {
        summaryWrap.innerHTML = `
            <div class="contest-finish-header">
                <h3>${autoFinished ? 'Контест завершён по таймеру' : 'Контест завершён'}</h3>
                <span class="contest-finish-score">${score}%</span>
            </div>
            <p class="contest-finish-lead">${verdictTitle}. ${verdictText}</p>
            <div class="contest-finish-progress">
                <div class="contest-finish-progress-bar" style="width: ${progressPct}%;"></div>
            </div>
            <p class="contest-finish-progress-label">Решено ${solved} из ${total} ${totalWord} (${progressPct}%)</p>
            <div class="contest-finish-grid">
                <div><strong>Решено:</strong> ${solved} ${solvedWord}</div>
                <div><strong>Не решено:</strong> ${failed}</div>
                <div><strong>Всего:</strong> ${total} ${totalWord}</div>
                <div><strong>Запусков:</strong> ${attempts} ${attemptsWord}</div>
                <div><strong>Результат:</strong> ${score}%</div>
                <div><strong>Время:</strong> ${formatDuration(timeUsed)}</div>
            </div>
        `;
        summaryWrap.classList.remove('hidden');
    }

    saveContestResult({
        contest_id: currentContestId,
        score,
        solved_count: solved,
        total_tasks: total,
        partial_count: 0,
        failed_count: failed,
        attempts_count: attempts,
        time_used_sec: timeUsed
    });
}

async function loadSavedTest(testId) {
    const id = Number(testId || 0);
    if (!id) return;

    const form = document.getElementById('test-form');
    const loading = document.getElementById('test-loading');
    const resultWrap = document.getElementById('test-result');
    const contentWrap = document.getElementById('test-content');

    form.classList.add('hidden');
    loading.classList.remove('hidden');
    startTestLoadingHints();
    resultWrap.classList.add('hidden');

    try {
        const response = await fetch(`/api/test_saved/${id}`);
        if (response.status === 401) {
            window.location.href = `/login?next=${encodeURIComponent(window.location.pathname + window.location.search)}`;
            return;
        }
        if (!response.ok) {
            throw new Error('Не удалось загрузить сохранённый тест.');
        }

        const payload = await response.json();
        currentTestId = Number(payload.id || 0) || null;

        const subjectInput = document.getElementById('subject');
        const classInput = document.getElementById('class');
        const themeInput = document.getElementById('theme');
        if (subjectInput) subjectInput.value = payload.subject || '';
        if (classInput) classInput.value = payload.klass || '';
        if (themeInput) themeInput.value = payload.theme || '';

        const generatedHtml = String(payload.generated_html || '');
        const normalizedHtml = window.normalizeMathDelimiters
            ? window.normalizeMathDelimiters(generatedHtml)
            : generatedHtml;
        contentWrap.innerHTML = normalizedHtml;
        if (window.renderMathInContainer) {
            window.renderMathInContainer(contentWrap);
        }
        initQuestionIndexes();
        resetTestState(currentTestId);
        bindOptionSelectionHandlers(contentWrap);
        initTestHandlers();
        resultWrap.classList.remove('hidden');
    } catch (error) {
        alert(error.message || 'Ошибка загрузки сохранённого теста.');
        form.classList.remove('hidden');
    } finally {
        loading.classList.add('hidden');
        stopTestLoadingHints();
    }
}

async function saveContestResult(payload) {
    if (!payload || !payload.contest_id) return;
    try {
        const response = await fetch('/api/contest_attempt', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (!response.ok) {
            const data = await response.json().catch(() => ({}));
            console.error('Не удалось сохранить результат контеста:', data.error || response.status);
        }
    } catch (error) {
        console.error('Ошибка сохранения контеста:', error);
    }
}

function renderRunOutput(container, payload, options = {}) {
    if (!container) return;
    container.innerHTML = '';

    const showDetailed = !!options.showDetailed;

    if (!payload.success) {
        const error = document.createElement('div');
        error.className = 'feedback incorrect-feedback';
        const compileText = String(payload.compile_error || '').trim();
        if (payload.error && payload.error.toLowerCase().includes('компиляц')) {
            error.textContent = '❌ Ошибка компиляции.';
        } else {
            error.textContent = `❌ ${payload.error || 'Ошибка запуска.'}`;
        }
        container.appendChild(error);
        if (compileText) {
            const compileDetails = document.createElement('pre');
            compileDetails.className = 'contest-io-block';
            compileDetails.textContent = compileText;
            container.appendChild(compileDetails);
        }
        return;
    }

    const summary = document.createElement('div');
    const allPassed = payload.verdict === 'ok' || payload.passed === payload.total;
    const firstFailed = (payload.results || []).find(result => !result.passed);
    const failedTestIndex = payload.failed_test || (firstFailed ? firstFailed.index : null);
    const verdictCode = payload.verdict || (firstFailed ? firstFailed.status : 'ok');
    const statusToText = (status) => {
        if (status === 'wrong_answer') return 'Неверный ответ';
        if (status === 'timeout') return 'Превышено время';
        if (status === 'runtime_error') return 'Ошибка выполнения';
        if (status === 'compile_error') return 'Ошибка компиляции';
        return 'OK';
    };

    if (!showDetailed) {
        if (allPassed) {
            summary.className = 'feedback correct-feedback';
            summary.textContent = '✅ OK';
        } else if (failedTestIndex) {
            summary.className = 'feedback incorrect-feedback';
            summary.textContent = `❌ Ошибка на тесте #${failedTestIndex} (${statusToText(verdictCode)})`;
        } else {
            summary.className = 'feedback incorrect-feedback';
            summary.textContent = '❌ Ошибка при проверке';
        }
    } else {
        if (allPassed) {
            summary.className = 'feedback correct-feedback';
            summary.textContent = `✅ Вердикт: OK. Пройдено ${payload.passed}/${payload.total}.`;
        } else if (failedTestIndex) {
            summary.className = 'feedback incorrect-feedback';
            summary.textContent = `❌ Вердикт: ${statusToText(verdictCode)} на тесте #${failedTestIndex}. Пройдено ${payload.passed}/${payload.total}.`;
        } else {
            summary.className = 'feedback neutral-feedback';
            summary.textContent = `⚠️ Пройдено ${payload.passed}/${payload.total} тестов`;
        }
    }

    container.appendChild(summary);

    const details = document.createElement('div');
    details.className = 'contest-run-details';

    (payload.results || []).forEach(result => {
        const item = document.createElement('div');
        item.className = `contest-run-test ${result.passed ? 'passed' : 'failed'}`;
        const title = document.createElement('h5');
        title.textContent = `Тест ${result.index}: ${statusToText(result.status)} (${result.time_ms} мс)`;
        item.appendChild(title);

        if (showDetailed && !result.passed) {
            const input = document.createElement('pre');
            input.className = 'contest-io-block';
            input.textContent = `Input:\n${result.input || ''}`;

            const expected = document.createElement('pre');
            expected.className = 'contest-io-block';
            expected.textContent = `Expected:\n${result.expected || ''}`;

            const actual = document.createElement('pre');
            actual.className = 'contest-io-block';
            actual.textContent = `Actual:\n${result.actual || ''}`;

            item.appendChild(input);
            item.appendChild(expected);
            item.appendChild(actual);

            if (result.stderr) {
                const err = document.createElement('pre');
                err.className = 'contest-io-block';
                err.textContent = `Ошибка:\n${result.stderr}`;
                item.appendChild(err);
            }
        }
        details.appendChild(item);
    });

    if ((payload.results || []).length) {
        if (payload.checked && payload.total && payload.checked < payload.total) {
            const stopInfo = document.createElement('div');
            stopInfo.className = 'feedback neutral-feedback';
            stopInfo.textContent = `Проверка остановлена на первом падении: выполнено ${payload.checked} из ${payload.total} тестов.`;
            container.appendChild(stopInfo);
        }
        container.appendChild(details);
    }
}

function updateTaskStateAfterRun(taskIndex, payload) {
    const state = contestTaskStates[taskIndex];
    if (!state) return;
    state.attempts += 1;
    state.passed = Number(payload && payload.passed || 0);
    state.total = Number(payload && payload.total || 0);

    if (payload && payload.success && payload.passed === payload.total && payload.total > 0) {
        state.status = 'solved';
    } else {
        state.status = 'failed';
    }
    refreshContestTaskNavStyles();
}

async function runTaskSolution(taskIndex, runnerElement) {
    if (contestFinished) return;

    const task = (currentContest && currentContest.tasks && currentContest.tasks[taskIndex]) || null;
    if (!task) return;

    const language = runnerElement.querySelector('.contest-language-select').value;
    const editorEntry = contestEditors.get(taskIndex);
    const code = editorEntry && editorEntry.editor
        ? editorEntry.editor.getValue()
        : runnerElement.querySelector('.contest-code-input').value;
    const outputWrap = runnerElement.querySelector('.contest-run-output');
    const runButton = runnerElement.querySelector('.contest-run-btn');

    outputWrap.innerHTML = '<div class="feedback neutral-feedback">⌛ Запуск тестов...</div>';
    runButton.disabled = true;

    try {
        const response = await fetch('/api/contest/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                language,
                code,
                tests: task.tests || []
            })
        });
        const payload = await response.json();
        renderRunOutput(outputWrap, payload, { showDetailed: contestShowDetailedResults });
        updateTaskStateAfterRun(taskIndex, payload);
    } catch (error) {
        outputWrap.innerHTML = '<div class="feedback incorrect-feedback">Ошибка запуска. Попробуйте ещё раз.</div>';
        console.error(error);
    } finally {
        runButton.disabled = false;
    }
}

                tasks_count: tasksCount,

    currentContest = null;
    currentContestId = null;
    contestTaskStates = [];
    contestFinished = false;
    document.getElementById('contestTasks').innerHTML = '';
    document.getElementById('contestSessionBar').classList.add('hidden');
    summaryWrap.classList.add('hidden');

    form.classList.add('hidden');
    loading.classList.remove('hidden');
    startContestLoadingHints();
    resultWrap.classList.add('hidden');

    try {
        const response = await fetch(`/api/contest_saved/${id}`);
        if (response.status === 401) {
            window.location.href = `/login?next=${encodeURIComponent(window.location.pathname + window.location.search)}`;
            return;
        }
        if (!response.ok) {
            throw new Error('Не удалось загрузить сохранённый контест.');
        }

        const data = await response.json();
        const contestPayload = data && data.contest ? data.contest : null;
        if (!contestPayload || !Array.isArray(contestPayload.tasks) || !contestPayload.tasks.length) {
            throw new Error('Сохранённый контест пустой или повреждён.');
        }

        currentContestId = Number(contestPayload.contest_id || id) || id;
        contestShowDetailedResults = !!document.getElementById('contestShowDetailedResults').checked;
        renderContest(contestPayload);
        startContestSession(Number(data.duration_minutes || 60));
        resultWrap.classList.remove('hidden');
    } catch (error) {
        alert(error.message || 'Ошибка загрузки сохранённого контеста.');
        form.classList.remove('hidden');
    } finally {
        loading.classList.add('hidden');
        stopContestLoadingHints();
    }
}

(async () => {
    if (initialSavedContestId) {
        setGeneratorMode('contest', false);
        await loadSavedContest(initialSavedContestId);
        return;
    }
    if (initialSavedTestId) {
        setGeneratorMode('test', false);
        await loadSavedTest(initialSavedTestId);
    }
})();
</script>
{% endblock %}
