{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<section class="page-card glass-card container auth-container">
    <div class="main-content auth-main">
        <h1 class="page-title no-copy">Вход</h1>
        <p class="auth-subtitle">Войдите в аккаунт, чтобы открыть чат, конспекты и тесты.</p>

        {% if error %}
            <p class="auth-error">{{ error }}</p>
        {% endif %}

        <form method="post" class="auth-form" autocomplete="off">
            <input type="hidden" name="next" value="{{ next_url }}">

            <div class="form-group">
                <label for="username">Логин</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    value="{{ username }}"
                    placeholder="Введите логин"
                    minlength="3"
                    maxlength="32"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Введите пароль"
                    minlength="8"
                    required
                >
            </div>

            <button type="submit" class="submit-btn">Войти</button>
        </form>

        <p class="auth-hint">
            Нет аккаунта?
            <a href="{{ url_for('register', next=next_url) }}">Зарегистрироваться</a>
        </p>
    </div>
</section>
{% endblock %}
