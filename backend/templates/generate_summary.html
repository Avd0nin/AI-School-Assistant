{% extends "base.html" %}

{% block title %}Главная страница{% endblock %}

{% block content %}
<section class="page-card glass-card">
    <div class="main-content summary-main">
        <div id="loading" class="hidden">
            <h1 class="page-title-sm no-copy">Генерируем для вас конспект, пожалуйста подождите</h1>
            <div class="spinner"></div>
            <div class="loading-hint-strip">
                <div class="loading-hint no-copy" id="loadingHint"></div>
            </div>
        </div>

        <div id="content">
            <h1 id="main-title" class="page-title no-copy">Генератор конспектов</h1>
            <form id="params-form" autocomplete="off">
                <input type="text" name="subject" placeholder="Например: Математика" required autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
                <input type="number" name="klass" placeholder="От 1 до 11" min="1" max="11" required>
                <input type="text" name="theme" placeholder="Например: Дроби" required autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
                <button type="submit">Сгенерировать</button>
            </form>
            <a href="/help" class="help-link">Инструкция по использованию</a>
            <div id="result" class="hidden"></div>
        </div>
    </div>
</section>

    <script>
        function goBack() {
            document.getElementById('result').innerHTML = '';
            document.getElementById('result').classList.add('hidden');
            document.getElementById('params-form').classList.remove('hidden');
            document.getElementById('main-title').classList.remove('hidden');
            document.querySelector('.help-link').classList.remove('hidden');
        }

        const loadingHints = [
            'Загрузка может занять пару минут — это нормально.',
            'Пока ждёте, можно открыть раздел тестов и потренироваться.',
            'Совет: после конспекта закрепите тему в ИИ чате вопросами.',
            'Краткий конспект уже собирается: структура, примеры и ключевые термины.',
            'Подсказка: чем точнее тема, тем полезнее результат.'
        ];
        let loadingHintTimer = null;

        function startLoadingHints() {
            const hintEl = document.getElementById('loadingHint');
            if (!hintEl) return;
            const showRandomHint = () => {
                hintEl.textContent = loadingHints[Math.floor(Math.random() * loadingHints.length)];
            };
            showRandomHint();
            loadingHintTimer = setInterval(showRandomHint, 2800);
        }

        function stopLoadingHints() {
            if (loadingHintTimer) {
                clearInterval(loadingHintTimer);
                loadingHintTimer = null;
            }
        }

        function enhanceSummaryCodeBlocks(container) {
            if (!container) return;
            const preBlocks = container.querySelectorAll('pre');
            preBlocks.forEach(pre => {
                if (pre.dataset.enhanced === '1') return;

                const codeEl = pre.querySelector('code') || pre;
                const declaredLanguage = window.extractCodeLanguage
                    ? window.extractCodeLanguage(codeEl, pre)
                    : '';
                let languageLabel = window.getCodeLanguageLabel
                    ? window.getCodeLanguageLabel(declaredLanguage)
                    : (declaredLanguage ? declaredLanguage.toUpperCase() : 'Код');

                const wrap = document.createElement('div');
                wrap.className = 'summary-code-wrap';

                const head = document.createElement('div');
                head.className = 'summary-code-head';

                const langTag = document.createElement('span');
                langTag.className = 'summary-code-lang no-copy';
                langTag.textContent = languageLabel;

                const copyBtn = document.createElement('button');
                copyBtn.type = 'button';
                copyBtn.className = 'summary-copy-btn';
                copyBtn.textContent = 'Скопировать';
                copyBtn.addEventListener('click', async () => {
                    const textToCopy = codeEl.textContent || '';
                    try {
                        await navigator.clipboard.writeText(textToCopy);
                        copyBtn.textContent = 'Скопировано';
                        setTimeout(() => {
                            copyBtn.textContent = 'Скопировать';
                        }, 1200);
                    } catch (e) {
                        copyBtn.textContent = 'Ошибка';
                        setTimeout(() => {
                            copyBtn.textContent = 'Скопировать';
                        }, 1200);
                    }
                });

                head.appendChild(langTag);
                head.appendChild(copyBtn);

                pre.parentNode.insertBefore(wrap, pre);
                wrap.appendChild(head);
                wrap.appendChild(pre);

                if (window.highlightCodeElement) {
                    const result = window.highlightCodeElement(codeEl, pre, declaredLanguage);
                    languageLabel = result && result.label ? result.label : languageLabel;
                    langTag.textContent = languageLabel;
                } else if (window.hljs && codeEl) {
                    window.hljs.highlightElement(codeEl);
                }

                pre.dataset.enhanced = '1';
            });
        }

        document.getElementById('params-form').addEventListener('submit', function(e) {
            e.preventDefault();  // Отменяем стандартную отправку формы

            // Скрываем форму и заголовок сразу при нажатии
            document.getElementById('params-form').classList.add('hidden');
            document.getElementById('main-title').classList.add('hidden');
            document.querySelector('.help-link').classList.add('hidden');
            
            // Показываем загрузку
            document.getElementById('loading').classList.remove('hidden');
            startLoadingHints();
            document.getElementById('result').classList.add('hidden');

            // Формируем GET-параметры
            const params = new URLSearchParams(new FormData(this));

            // Отправляем запрос
            fetch(`/api/summary?${params.toString()}`)
                .then(response => {
                    if (!response.ok) throw new Error('Ошибка сервера');
                    return response.text();
                })
                .then(html => {
                    const cleanHtml = window.normalizeMathDelimiters ? window.normalizeMathDelimiters(html) : html;
                    document.getElementById('result').innerHTML = `
                        <article class="summary-article">${cleanHtml}</article>
                        <div class="result-actions">
                            <button class="back-button" onclick="goBack()">
                                Назад
                            </button>
                        </div>
                    `;
                    document.getElementById('result').classList.remove('hidden');
                    if (window.renderMathInContainer) {
                        window.renderMathInContainer(document.getElementById('result'));
                    }
                    enhanceSummaryCodeBlocks(document.getElementById('result'));
                })
                .catch(error => {
                    console.error('Ошибка:', error);
                    document.getElementById('result').innerHTML = `
                        <p class="error-text">Ошибка: ${error.message}</p>
                    `;
                    document.getElementById('result').classList.remove('hidden');
                    // В случае ошибки возвращаем форму
                    document.getElementById('params-form').classList.remove('hidden');
                    document.getElementById('main-title').classList.remove('hidden');
                    document.querySelector('.help-link').classList.remove('hidden');
                })
                .finally(() => {
                    // В любом случае скрываем загрузку
                    document.getElementById('loading').classList.add('hidden');
                    stopLoadingHints();
                });
        });

    </script>
{% endblock %}
