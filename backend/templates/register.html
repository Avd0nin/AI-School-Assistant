{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<section class="page-card glass-card container auth-container">
    <div class="main-content auth-main">
        <h1 class="page-title no-copy">Регистрация</h1>
        <p class="auth-subtitle">Создайте аккаунт, чтобы сохранить персональный доступ к функциям платформы.</p>

        {% if error %}
        <p class="auth-error">{{ error }}</p>
        {% endif %}

        <form method="post" class="auth-form" autocomplete="off">
            <input type="hidden" name="next" value="{{ next_url }}">

            <div class="form-group">
                <label for="username">Логин</label>
                <input type="text" id="username" name="username" value="{{ username }}"
                    placeholder="Например: student_7a" minlength="3" maxlength="32" required>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Минимум 8 символов" minlength="8"
                    required>
            </div>

            <div class="form-group">
                <label for="password_confirm">Повторите пароль</label>
                <input type="password" id="password_confirm" name="password_confirm" placeholder="Повторите пароль"
                    minlength="8" required>
            </div>

            <button type="submit" class="submit-btn">Создать аккаунт</button>
        </form>

        <p class="auth-hint">
            Уже есть аккаунт?
            <a href="{{ url_for('login', next=next_url) }}">Войти</a>
        </p>
    </div>
</section>
{% endblock %}
